name: Pack & Publish
# Builds and packs the Vion.ServiceProvider.Sdk on every push to main, pushes
# intermediate packages to the VION private feed, and on a vX.Y.Z tag push
# also publishes to nuget.org using NUGET_API_KEY.
#
# Pipeline logic lives in VION-IoT/shared-workflows. See that repo for the
# input contract and version-pinning policy.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: VION-IoT/shared-workflows/actions/setup-nuget-private-feed@v1
        with:
          pat: ${{ secrets.AZURE_DEVOPS_PAT }}
      - name: Test
        run: dotnet test Vion.ServiceProvider.Sdk.slnx -c Release

  publish:
    needs: test
    uses: VION-IoT/shared-workflows/.github/workflows/publish-nuget.yml@v1
    with:
      solution: Vion.ServiceProvider.Sdk.slnx
    secrets: inherit
