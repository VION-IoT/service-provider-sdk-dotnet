name: Pack & Publish
# Builds, tests, and verifies code style, then packs the Vion.ServiceProvider.Sdk on
# every push to main, pushes intermediate packages to the VION private feed, and on a
# vX.Y.Z tag push also publishes to nuget.org using NUGET_API_KEY.
#
# The build/test/style gate (gate: true) runs in the pack job on every PR/main/tag,
# reusing the one build — see CLAUDE.md (Code Style) and VION-IoT/shared-workflows
# actions/dotnet-gate. Pipeline logic lives in VION-IoT/shared-workflows; see that repo
# for the input contract and version-pinning policy.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    uses: VION-IoT/shared-workflows/.github/workflows/publish-nuget.yml@v1
    with:
      solution: Vion.ServiceProvider.Sdk.sln
      # Build + test + ReSharper cleanupcode style gate before packing, in the pack job
      # (one build). Requires the cleanup setup in this repo (.config/dotnet-tools.json,
      # scripts/cleanup-code.ps1, Vion.ServiceProvider.Sdk.sln.DotSettings).
      gate: true
    secrets: inherit
